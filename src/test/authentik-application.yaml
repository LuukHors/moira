apiVersion: moira.operator/v1alpha1
kind: AuthentikOidcApplication
metadata:
  name: dev-argocd-application
  namespace: default
spec:
  displayName: dev-argocd-application
  autoDelete: true
  providerRef:
    name: authentik-provider
  group: moira
  metadataSettings:
    publisher: moira.cloud
  tokenSettings:
    accessTokenValidity: days=10
  oidc:
    redirectUris:
      - https://argocd.example.com/auth/callback
    logoutUri: https://argocd.example.com/
    launchUrl: https://argocd.example.com/
  secrets:
    - name: dev-argocd-application-oidc
      namespace: default
      template:
        oidc-url: "client={clientId}&secret={clientSecret}"
        client-id: "{clientId}"
        client-secret: "{clientSecret}"
---
apiVersion: moira.operator/v1alpha1
kind: AuthentikOidcApplication
metadata:
  name: moira-test
  namespace: default
spec:
  displayName: moira-test
  autoDelete: false
  providerRef:
    name: authentik-provider
  group: moira
  metadataSettings:
    publisher: moira.cloud
  tokenSettings:
    accessTokenValidity: days=10
  oidc:
    redirectUris:
      - https://moira.example.com/oauth/callback
    launchUrl: https://moira.example.com/
  secrets:
    - name: moira-test-oidc
      namespace: default
---
apiVersion: moira.operator/v1alpha1
kind: AuthentikOidcApplication
metadata:
  name: native-public-client
  namespace: default
spec:
  displayName: native-public-client
  providerRef:
    name: authentik-provider
  group: moira
  metadataSettings:
    publisher: moira.cloud
  tokenSettings:
    accessTokenValidity: days=10
  oidc:
    applicationType: Native
    clientAuthenticationMethod: None
    redirectUris:
      - http://127.0.0.1:8080/callback
  secrets:
    - name: native-public-client-oidc
      namespace: default
