apiVersion: moira.operator/v1alpha1
kind: OidcApplication
metadata:
  name: dev-argocd-application
  namespace: default
spec:
  displayName: dev-argocd-application
  autoDelete: true
  providerRef:
    name: authentik-provider
  secrets:
    - name: dev-argocd-application-oidc
      namespace: default
      template:
        oidc-url: "client={clientId}&secret={clientSecret}"
        client-id: "{clientId}"
        client-secret: "{clientSecret}"
---
apiVersion: moira.operator/v1alpha1
kind: OidcApplication
metadata:
  name: moira-test
  namespace: default
spec:
  displayName: moira-test
  autoDelete: false
  providerRef:
    name: authentik-provider
  secrets:
    - name: moira-test-oidc
      namespace: default
